# ============================================
# GitHub Actions - Continuous Integration (CI)
# Runs on every push to main branch
# ============================================

name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download code from repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Step 3: Install backend dependencies
      - name: Install dependencies
        working-directory: backend
        run: npm install

      # Step 4: Run structure/syntax checks (npm run check)
      - name: Run build checks
        working-directory: backend
        run: npm run check

      # Step 5: Verify server files load without syntax errors
      - name: Verify server syntax
        working-directory: backend
        run: node --check src/server.js

      # Step 6: Build Docker image to ensure Dockerfile is valid
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: taskmanager-backend:ci-${{ github.sha }}
          load: true

      # Step 7: Summary for GitHub Actions UI
      - name: CI Success
        run: echo "CI pipeline completed successfully!"