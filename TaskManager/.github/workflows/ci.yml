name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: TaskManager/backend
        run: npm install

      - name: Run build checks
        working-directory: TaskManager/backend
        run: npm run check

      - name: Verify server syntax
        working-directory: TaskManager/backend
        run: node --check src/server.js

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: TaskManager/backend
          file: TaskManager/backend/Dockerfile
          push: false
          tags: taskmanager-backend:ci-${{ github.sha }}
          load: true

      - name: CI Success
        run: echo "CI pipeline completed successfully!"