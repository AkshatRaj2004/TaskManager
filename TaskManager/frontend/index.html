<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager | DevOps Project</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app-wrapper">
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <h1 class="logo">Task Manager</h1>
        <p class="tagline">CI/CD &amp; Auto Rollback — College DevOps Project</p>
      </div>
    </header>

    <!-- Toast container - modern notifications appear here -->
    <div id="toastContainer" class="toast-container" aria-live="polite"></div>

    <!-- Main content -->
    <main class="main">
      <!-- Add Task Form -->
      <section class="card add-task-card">
        <h2>Add New Task</h2>
        <form id="taskForm" class="task-form">
          <div class="form-group">
            <label for="taskTitle">Title *</label>
            <input
              type="text"
              id="taskTitle"
              placeholder="e.g. Complete DevOps assignment"
              required
              maxlength="200"
            />
          </div>
          <div class="form-group">
            <label for="taskDescription">Description</label>
            <textarea
              id="taskDescription"
              placeholder="Optional details..."
              rows="2"
            ></textarea>
          </div>

          <!-- Row: Due Date + Priority (new features) -->
          <div class="form-row">
            <div class="form-group">
              <label for="taskDueDate">Due Date</label>
              <input type="date" id="taskDueDate" />
            </div>
            <div class="form-group">
              <label for="taskPriority">Priority</label>
              <select id="taskPriority">
                <option value="High">High</option>
                <option value="Medium" selected>Medium</option>
                <option value="Low">Low</option>
              </select>
            </div>
          </div>

          <button type="submit" class="btn btn-primary" id="submitBtn">
            Add Task
          </button>
        </form>
      </section>

      <!-- Task Stats -->
      <section class="stats-bar">
        <span id="totalCount">Total: 0</span>
        <span id="pendingCount">Pending: 0</span>
        <span id="completedCount">Completed: 0</span>
        <span id="overdueCount">Overdue: 0</span>
      </section>

      <!-- Task List -->
      <section class="card tasks-card">
        <h2>Your Tasks</h2>

        <!-- Live search - filters tasks while typing (client-side) -->
        <div class="search-wrapper">
          <label for="searchInput" class="sr-only">Search tasks</label>
          <input
            type="search"
            id="searchInput"
            class="search-input"
            placeholder="Search by title or description..."
            autocomplete="off"
          />
        </div>

        <div id="loadingMessage" class="loading hidden">Loading tasks...</div>
        <div id="emptyMessage" class="empty hidden">No tasks yet. Add one above!</div>
        <div id="noResultsMessage" class="empty hidden">No tasks match your search.</div>
        <ul id="taskList" class="task-list"></ul>
      </section>
    </main>

    <footer class="footer">
      <p>Node.js + Express + MongoDB | Docker | GitHub Actions | Jenkins</p>
    </footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
